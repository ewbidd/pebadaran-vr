<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Virtual Tour – Kampung Pebadaran</title>
    <meta
      name="description"
      content="Jelajahi Kampung Pebadaran secara virtual 360° seperti Google Street View."
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Three.js via Import Map -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
      }
    </script>

    <!-- Scene Data (global SCENES array) -->
    <script src="data/scene.js"></script>

    <link rel="stylesheet" href="style.css" />

    <!-- Preload gambar pertama agar langsung dimuat -->
    <link rel="preload" href="assets/images/1.jpg" as="image" />
  </head>

  <body>
    <!-- ==============================
         LOADING SCREEN
    ================================= -->
    <div id="loading-screen">
      <div class="loading-content">
        <div class="loading-logo">
          <div class="logo-ring"></div>
          <div class="logo-ring ring-2"></div>
          <div class="logo-inner">
            <span>360°</span>
          </div>
        </div>
        <h1 class="loading-title">Virtual Tour</h1>
        <p class="loading-subtitle">Kampung<br /><strong>Pebadaran</strong></p>
        <div class="loading-bar-wrap">
          <div class="loading-bar" id="loadingBar"></div>
        </div>
        <p class="loading-hint" id="loadingHint">Memuat aset panorama...</p>
      </div>
    </div>

    <!-- ==============================
         THREE.JS CANVAS
    ================================= -->
    <canvas id="vrCanvas"></canvas>

    <!-- ==============================
         HUD OVERLAY
    ================================= -->
    <div id="hud" class="hud">
      <!-- TOP BAR -->
      <div class="hud-top">
        <div class="hud-brand">
          <div class="brand-info">
            <span class="brand-name">Virtual Tour</span>
            <span class="brand-sub">Kampung Pebadaran</span>
          </div>
        </div>
        <div class="hud-actions">
          <select
            id="selectScene"
            class="hud-select"
            title="Lompat ke Lokasi"
          ></select>
          <button id="btnGyro" class="hud-btn" title="Toggle Gyroscope">
            GYRO: ON
          </button>
          <button id="btnFullscreen" class="hud-btn" title="Layar Penuh">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"
              />
            </svg>
          </button>
        </div>
      </div>

      <!-- SCENE INFO -->
      <div class="scene-info" id="sceneInfo">
        <div class="scene-meta">
          <h2 class="scene-label" id="sceneLabel">Gerbang Utama</h2>
          <p class="scene-desc" id="sceneDesc">
            Pintu masuk Fakultas Teknik UNRI
          </p>
          <div class="scene-dot-wrap" id="sceneDots"></div>
        </div>
      </div>

      <!-- HINT DRAG -->
      <div class="drag-hint" id="dragHint">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          width="20"
          height="20"
        >
          <path d="M9 11V6.5a1.5 1.5 0 0 1 3 0V11" />
          <path d="M12 11V5.5a1.5 1.5 0 0 1 3 0V11" />
          <path
            d="M15 11V7.5a1.5 1.5 0 0 1 3 0V15a6 6 0 0 1-6 6H9a6 6 0 0 1-6-6V11a1.5 1.5 0 0 1 3 0"
          />
        </svg>
        Seret untuk melihat sekitar
      </div>

      <!-- NAVIGATION -->
      <div class="nav-controls">
        <div class="nav-compass" id="navCompass">
          <div class="compass-ring">
            <div class="compass-needle"></div>
            <span class="compass-n">N</span>
          </div>
        </div>
      </div>

      <!-- COPYRIGHT OVERLAY -->
      <div class="hud-copyright">
        Copyright &copy; 2026 | Dibuat dengan ❤️ oleh KKN UNRI 2026
      </div>
    </div>

    <!-- SCENE LOADING SPINNER (muncul saat gambar belum siap) -->
    <div id="sceneSpinner" class="scene-spinner">
      <div class="scene-spinner-ring"></div>
      <span>Memuat...</span>
    </div>

    <!-- FADE OVERLAY for transitions -->
    <div id="fadeOverlay" class="fade-overlay"></div>

    <script type="module" src="app.js"></script>
  </body>
</html>
